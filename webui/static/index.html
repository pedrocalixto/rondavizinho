<!doctype html>
<html lang="pt-BR" data-bs-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RondaVizinho — Painel</title>
<link rel="icon" href="assets/icon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Michroma&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="assets/marca.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
<style>
  .foto-card img { object-fit: cover; height: 180px; width: 100%; cursor: pointer;
                   border-radius: var(--raio) var(--raio) 0 0; }
  .contexto { font-size: .8rem; white-space: pre-wrap; max-height: 7em; overflow-y: auto; }
  .insight { font-size: .875rem; }
</style>
</head>
<body>

<nav class="navbar navbar-expand navbar-marca mb-4">
  <div class="container">
    <a class="navbar-brand brand" href="/">
      <img src="assets/icon.svg" alt="" style="height: 30px">
      <span class="wordmark">Ronda<b>Vizinho</b></span></a>
    <span class="navbar-text text-secondary" id="cabecalho"></span>
  </div>
</nav>

<div class="container">

  <!-- Insights -->
  <div class="row g-3 mb-4" id="insights"></div>

  <!-- Gráfico -->
  <div class="card shadow-sm mb-4">
    <div class="card-header bg-white fw-semibold">Detecções por dia · aumento percentual acumulado</div>
    <div class="card-body"><canvas id="grafico" height="90"></canvas></div>
  </div>

  <!-- Números rápidos -->
  <div class="row g-3 mb-4" id="numeros"></div>

  <!-- Galeria -->
  <div class="card shadow-sm mb-5">
    <div class="card-header bg-white d-flex justify-content-between align-items-center">
      <span class="fw-semibold">Fotos dos alertas (com o contexto da detecção)</span>
      <select id="filtroDia" class="form-select form-select-sm w-auto">
        <option value="">todos os dias</option>
      </select>
    </div>
    <div class="card-body"><div class="row g-3" id="galeria"></div></div>
  </div>
</div>

<!-- foto ampliada -->
<div class="modal fade" id="modalFoto" tabindex="-1">
  <div class="modal-dialog modal-xl modal-dialog-centered">
    <div class="modal-content">
      <img id="fotoGrande" class="img-fluid rounded-top" alt="">
      <div class="modal-body contexto" id="fotoContexto"></div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
const el = id => document.getElementById(id);

function cardInsight(txt) {
  return `<div class="col-md-6 col-lg-3"><div class="card h-100 shadow-sm">
    <div class="card-body insight">${txt}</div></div></div>`;
}

function cardNumero(rotulo, valor) {
  return `<div class="col-6 col-md-3"><div class="card text-center shadow-sm">
    <div class="card-body"><div class="fs-3 num-marca">${valor}</div>
    <div class="text-secondary small">${rotulo}</div></div></div></div>`;
}

async function carrega() {
  const r = await (await fetch('/api/resumo')).json();
  el('cabecalho').textContent =
    `${r.total} detecções · ${r.total_alertas} alertas`;

  el('insights').innerHTML = r.insights.map(cardInsight).join('');

  const tipos = Object.entries(r.por_tipo).map(([t, n]) => `${t}: ${n}`).join(' · ');
  el('numeros').innerHTML =
    cardNumero('detecções no período', r.total) +
    cardNumero('alertas enviados', r.total_alertas) +
    cardNumero('dias monitorados', r.dias.length) +
    cardNumero('por tipo', tipos || '—');

  new Chart(el('grafico'), {
    data: {
      labels: r.dias,
      datasets: [
        { type: 'bar', label: 'detecções', data: r.total_dia,
          backgroundColor: 'rgba(37,99,235,.55)', yAxisID: 'y' },      // azul-vivo
        { type: 'bar', label: 'alertas', data: r.alertas_dia,
          backgroundColor: 'rgba(245,158,11,.9)', yAxisID: 'y' },      // âmbar
        { type: 'line', label: 'aumento acumulado (%)', data: r.pct_acumulado,
          borderColor: '#10b981', tension: .25, yAxisID: 'y2', pointRadius: 3 }
      ]
    },
    options: {
      scales: {
        y:  { beginAtZero: true, title: { display: true, text: 'detecções/dia' } },
        y2: { position: 'right', grid: { drawOnChartArea: false },
              title: { display: true, text: 'acumulado (%)' } }
      },
      interaction: { mode: 'index', intersect: false }
    }
  });

  const filtro = el('filtroDia');
  r.dias.slice().reverse().forEach(d =>
    filtro.insertAdjacentHTML('beforeend', `<option value="${d}">${d}</option>`));
  filtro.onchange = () => carregaFotos(filtro.value);
  carregaFotos('');
}

async function carregaFotos(dia) {
  const fotos = await (await fetch('/api/fotos' + (dia ? `?dia=${dia}` : ''))).json();
  el('galeria').innerHTML = fotos.length ? fotos.map(f => `
    <div class="col-sm-6 col-lg-4 col-xl-3">
      <div class="card foto-card h-100 shadow-sm">
        <img src="${f.url}" loading="lazy" alt="${f.nome}"
             onclick="amplia('${f.url}', this.closest('.card').querySelector('.contexto').innerText)">
        <div class="card-body p-2">
          <div class="small text-secondary">${f.data} ${f.hora}</div>
          <div class="contexto">${f.contexto.replace(/</g, '&lt;')}</div>
        </div>
      </div>
    </div>`).join('')
    : '<p class="text-secondary m-2">Nenhuma foto de alerta neste período.</p>';
}

function amplia(url, ctx) {
  el('fotoGrande').src = url;
  el('fotoContexto').textContent = ctx;
  new bootstrap.Modal(el('modalFoto')).show();
}

carrega();
setInterval(carrega, 300000);  // atualiza a cada 5 min
</script>
</body>
</html>
